# STM32H5 用 OpenOCD 最小設定（Windows / OpenOCD 0.12.0・stm32h5x.cfg 無し）
# 使い方: openocd -f openocd-h5-windows.cfg   → gdb server :3333
# フラッシュ書込みは STM32_Programmer_CLI を使う前提（本 cfg はデバッグ接続専用）
#
# Linux 版（snippets/openocd-h5.cfg）との違い：
#   - Linux distro 版 OpenOCD は interface/stlink.cfg（hla ドライバ）＋ `transport select swd` で動くが、
#     Windows の OpenOCD 0.12.0 では hla ドライバが swd を拒否する
#       → "Error: Debug adapter doesn't support 'swd' transport"
#   - そのため stlink-dap.cfg（st-link ドライバ＝DAP）＋ `transport select dapdirect_swd` を使う。
source [find interface/stlink-dap.cfg]
transport select dapdirect_swd
adapter speed 2000
set _CHIPNAME stm32h5
swd newdap $_CHIPNAME cpu -expected-id 0
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
target create $_CHIPNAME.cpu cortex_m -dap $_CHIPNAME.dap
