# STM32H5 用 OpenOCD 最小設定（ディストリ版 OpenOCD に stm32h5x.cfg が無い場合）
# 使い方: openocd -f openocd-h5.cfg   → gdb server :3333
# フラッシュ書込みは STM32_Programmer_CLI を使う前提（本 cfg はデバッグ接続専用）
source [find interface/stlink.cfg]
transport select swd
adapter speed 2000
set _CHIPNAME stm32h5
swd newdap $_CHIPNAME cpu -expected-id 0
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
target create $_CHIPNAME.cpu cortex_m -dap $_CHIPNAME.dap
